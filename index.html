<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risco Incêndio Rural</title>
  <style>
    :root{--bg:#07111f;--card:#0f1b2d;--card2:#12233a;--text:#eaf2ff;--muted:#9fb2cc;--line:#223652;--accent:#ff4d4d}
    *{box-sizing:border-box} 
    body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
    
    .wrap{max-width:1400px;margin:0 auto;padding:20px}
    h1{font-size:22px; text-align: center; margin-bottom: 10px; color: #fff; letter-spacing: 1px; text-transform: uppercase;}
    
    /* Data aumentada e destacada */
    #data-atual {
      text-align: center;
      color: var(--text);
      font-size: 24px; /* Tamanho aumentado */
      font-weight: bold;
      margin-bottom: 30px;
      text-transform: capitalize;
      display: block;
    }

    .concelhos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); 
      gap: 15px;
    }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card h2 {
      font-size: 14px;
      margin: 0 0 10px 0;
      text-align: center;
      color: var(--muted);
      text-transform: uppercase;
    }

    .graph-box {
      position: relative;
      width: 260px; 
      height: 160px; 
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .graph-box iframe {
      position: absolute;
      top: -180px; 
      left: -65px; 
      width: 400px; 
      height: 500px;
      border: none;
      transform: scale(1.05); 
      transform-origin: top left;
      pointer-events: none;
    }

    .footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 11px; opacity: 0.6; }
  </style>
</head>
<body>

<div class="wrap">
  <h1>Risco de Incêndio Rural</h1>
  <div id="data-atual"></div>

  <div class="concelhos-grid">
    <div class="card">
      <h2>Leiria</h2>
      <div class="graph-box">
        <iframe src="https://fogos.icnf.pt/rif/Stat_Global_Sensibilizacao_Riscolist2.asp?x_Distrito=Leiria&x_Concelho=Leiria" scrolling="no"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>Alcobaça</h2>
      <div class="graph-box">
        <iframe src="https://fogos.icnf.pt/rif/Stat_Global_Sensibilizacao_Riscolist2.asp?x_Distrito=Leiria&x_Concelho=Alcobaça" scrolling="no"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>Batalha</h2>
      <div class="graph-box">
        <iframe src="https://fogos.icnf.pt/rif/Stat_Global_Sensibilizacao_Riscolist2.asp?x_Distrito=Leiria&x_Concelho=Batalha" scrolling="no"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>Marinha Grande</h2>
      <div class="graph-box">
        <iframe src="https://fogos.icnf.pt/rif/Stat_Global_Sensibilizacao_Riscolist2.asp?x_Distrito=Leiria&x_Concelho=Marinha+Grande" scrolling="no"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>Ourém</h2>
      <div class="graph-box">
        <iframe src="https://fogos.icnf.pt/rif/Stat_Global_Sensibilizacao_Riscolist2.asp?x_Distrito=Santarém&x_Concelho=Ourém" scrolling="no"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>Pombal</h2>
      <div class="graph-box">
        <iframe src="https://fogos.icnf.pt/rif/Stat_Global_Sensibilizacao_Riscolist2.asp?x_Distrito=Leiria&x_Concelho=Pombal" scrolling="no"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>Porto de Mós</h2>
      <div class="graph-box">
        <iframe src="https://fogos.icnf.pt/rif/Stat_Global_Sensibilizacao_Riscolist2.asp?x_Distrito=Leiria&x_Concelho=Porto+de+Mós" scrolling="no"></iframe>
      </div>
    </div>
  </div>

  <div class="footer">
    Monitorização em Tempo Real | Atualização automática total a cada 60 min.
  </div>
</div>

<script>
  // Função para mostrar a data atual formatada
  function exibirData() {
    const agora = new Date();
    const opcoes = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-PT', opcoes);
  }

  // Executa ao abrir a página
  exibirData();

  // ATUALIZAÇÃO AUTOMÁTICA TOTAL:
  // Recarrega a página inteira a cada 60 minutos (3600000 ms)
  // Isso garante que a data mude e os iframes do ICNF puxem dados novos.
  setTimeout(() => {
    window.location.reload();
  }, 3600000);
</script>

</body>
</html>
